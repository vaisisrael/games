<h2>רשימת חלקים בציור</h2>
<ol id="parts"></ol>

<script type="application/json" id="inspire-l1">{"zoom": {"x": 365, "y": 155, "w": 175, "h": 125}, "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"], "fills": {"stain-main": 6, "stain-top": 0, "stain-bottom": 4}}</script>
<script type="application/json" id="inspire-l2">{"zoom": {"x": 360, "y": 150, "w": 190, "h": 135}, "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"], "fills": {"stain-main": 6, "stain-ring": 7, "stain-top": 0, "stain-middle-left": 4, "stain-middle-right": 4, "stain-bottom": 1, "stain-spot-1": 5, "stain-spot-2": 5, "stain-spot-3": 2, "stain-spot-4": 2}}</script>

<script>
const wraps = {
  l1: document.getElementById('wrap-l1'),
  l2: document.getElementById('wrap-l2')
};
let current = 'l1';

function show(level) {
  current = level;
  wraps.l1.classList.toggle('hidden', level !== 'l1');
  wraps.l2.classList.toggle('hidden', level !== 'l2');
  buildParts();
}

function getSvg(level=current) {
  return wraps[level].querySelector('svg');
}

function resetSvg(level=current) {
  const svg = getSvg(level);
  svg.setAttribute('viewBox', '0 0 860 520');
  svg.querySelectorAll('[data-id]').forEach(el => {
    el.setAttribute('fill', 'none');
  });
}

function applyInspiration(level) {
  show(level);
  resetSvg(level);
  const svg = getSvg(level);
  const data = JSON.parse(document.getElementById(level === 'l1' ? 'inspire-l1' : 'inspire-l2').textContent);
  svg.setAttribute('viewBox', `${data.zoom.x} ${data.zoom.y} ${data.zoom.w} ${data.zoom.h}`);
  Object.entries(data.fills).forEach(([id, idx]) => {
    const el = svg.querySelector(`[data-id="${id}"]`);
    if (el) el.setAttribute('fill', data.palette[idx]);
  });
}

function buildParts() {
  const list = document.getElementById('parts');
  list.innerHTML = '';
  const seen = new Set();
  getSvg().querySelectorAll('[data-id][data-name]').forEach(el => {
    const key = el.getAttribute('data-id');
    if (seen.has(key)) return;
    seen.add(key);
    const li = document.createElement('li');
    li.innerHTML = `${el.getAttribute('data-name')} <small>(${key})</small>`;
    list.appendChild(li);
  });
}

document.querySelectorAll('[data-show]').forEach(btn => {
  btn.addEventListener('click', () => show(btn.getAttribute('data-show')));
});
document.getElementById('apply-l1').addEventListener('click', () => applyInspiration('l1'));
document.getElementById('apply-l2').addEventListener('click', () => applyInspiration('l2'));
document.getElementById('reset').addEventListener('click', () => { resetSvg('l1'); resetSvg('l2'); show(current); });

show('l1');
resetSvg('l1');
resetSvg('l2');
</script>
