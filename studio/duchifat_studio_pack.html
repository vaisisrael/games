  <h2>רשימת חלקים בציור</h2>
  <ol id="parts-list"></ol>

<script>
(function() {
  const panelL1 = document.getElementById('panel-l1');
  const panelL2 = document.getElementById('panel-l2');
  const btnShowL1 = document.getElementById('show-l1');
  const btnShowL2 = document.getElementById('show-l2');
  const btnApplyL1 = document.getElementById('apply-l1');
  const btnApplyL2 = document.getElementById('apply-l2');
  const btnReset = document.getElementById('reset-view');
  const svgL1 = panelL1.querySelector('svg');
  const svgL2 = panelL2.querySelector('svg');
  const originalViewBoxL1 = svgL1.getAttribute('viewBox');
  const originalViewBoxL2 = svgL2.getAttribute('viewBox');

  function activate(which) {
    panelL1.classList.toggle('active', which === 'l1');
    panelL2.classList.toggle('active', which === 'l2');
    btnShowL1.classList.toggle('active', which === 'l1');
    btnShowL2.classList.toggle('active', which === 'l2');
    buildPartsList(which === 'l1' ? svgL1 : svgL2);
  }

  function clearColors(svg) {
    svg.querySelectorAll('[data-id]').forEach(el => el.setAttribute('fill', 'none'));
  }

  function applyInspiration(svg, scriptId, originalViewBox) {
    clearColors(svg);
    const data = JSON.parse(document.getElementById(scriptId).textContent);
    Object.entries(data.fills).forEach(([id, paletteIndex]) => {
      const el = svg.querySelector('[data-id="' + id + '"]');
      if (el) el.setAttribute('fill', data.palette[paletteIndex]);
    });
    svg.setAttribute('viewBox', data.zoom.x + ' ' + data.zoom.y + ' ' + data.zoom.w + ' ' + data.zoom.h);
  }

  function resetAll() {
    clearColors(svgL1);
    clearColors(svgL2);
    svgL1.setAttribute('viewBox', originalViewBoxL1);
    svgL2.setAttribute('viewBox', originalViewBoxL2);
  }

  function buildPartsList(svg) {
    const list = document.getElementById('parts-list');
    list.innerHTML = '';
    svg.querySelectorAll('[data-id][data-name]').forEach(el => {
      const li = document.createElement('li');
      li.innerHTML = el.getAttribute('data-name') + ' <small>(' + el.getAttribute('data-id') + ')</small>';
      list.appendChild(li);
    });
  }

  btnShowL1.addEventListener('click', () => activate('l1'));
  btnShowL2.addEventListener('click', () => activate('l2'));
  btnApplyL1.addEventListener('click', () => { activate('l1'); resetAll(); applyInspiration(svgL1, 'inspire-l1', originalViewBoxL1); buildPartsList(svgL1); });
  btnApplyL2.addEventListener('click', () => { activate('l2'); resetAll(); applyInspiration(svgL2, 'inspire-l2', originalViewBoxL2); buildPartsList(svgL2); });
  btnReset.addEventListener('click', () => { resetAll(); buildPartsList(panelL1.classList.contains('active') ? svgL1 : svgL2); });

  buildPartsList(svgL1);
})();
</script>
