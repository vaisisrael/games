  <h2>רשימת חלקים בציור</h2>
  <ol id="parts-list"></ol>

  <script type="application/json" id="inspire-l1">{
  &quot;zoom&quot;: {
    &quot;x&quot;: 340,
    &quot;y&quot;: 80,
    &quot;w&quot;: 180,
    &quot;h&quot;: 140
  },
  &quot;palette&quot;: [
    &quot;#60a5fa&quot;,
    &quot;#1d4ed8&quot;,
    &quot;#a78bfa&quot;,
    &quot;#16a34a&quot;,
    &quot;#f59e0b&quot;,
    &quot;#ef4444&quot;,
    &quot;#9ca3af&quot;,
    &quot;#111827&quot;
  ],
  &quot;fills&quot;: {
    &quot;top-fin&quot;: 0
  }
}</script>
  <script type="application/json" id="inspire-l2">{
  &quot;zoom&quot;: {
    &quot;x&quot;: 340,
    &quot;y&quot;: 80,
    &quot;w&quot;: 180,
    &quot;h&quot;: 140
  },
  &quot;palette&quot;: [
    &quot;#60a5fa&quot;,
    &quot;#1d4ed8&quot;,
    &quot;#a78bfa&quot;,
    &quot;#16a34a&quot;,
    &quot;#f59e0b&quot;,
    &quot;#ef4444&quot;,
    &quot;#9ca3af&quot;,
    &quot;#111827&quot;
  ],
  &quot;fills&quot;: {
    &quot;top-fin&quot;: 0,
    &quot;top-fin-inner-left&quot;: 1,
    &quot;top-fin-inner-right&quot;: 1
  }
}</script>

<script>
const wrapL1 = document.getElementById('wrap-l1');
const wrapL2 = document.getElementById('wrap-l2');
const btnShowL1 = document.getElementById('show-l1');
const btnShowL2 = document.getElementById('show-l2');
const btnInspireL1 = document.getElementById('apply-inspire-l1');
const btnInspireL2 = document.getElementById('apply-inspire-l2');
const btnReset = document.getElementById('reset-view');
const partsList = document.getElementById('parts-list');

function getActiveWrap() {
  return wrapL2.classList.contains('hidden') ? wrapL1 : wrapL2;
}

function getSvg(wrap) {
  return wrap.querySelector('svg');
}

function clearFills(wrap) {
  wrap.querySelectorAll('[data-id]').forEach(el => el.setAttribute('fill', 'none'));
}

function resetWrap(wrap) {
  clearFills(wrap);
  const svg = getSvg(wrap);
  svg.setAttribute('viewBox', '0 0 860 520');
}

function setMode(mode) {
  const isL1 = mode === 'l1';
  wrapL1.classList.toggle('hidden', !isL1);
  wrapL2.classList.toggle('hidden', isL1);
  btnShowL1.classList.toggle('active', isL1);
  btnShowL2.classList.toggle('active', !isL1);
  buildList();
}

function applyInspire(mode) {
  const wrap = mode === 'l1' ? wrapL1 : wrapL2;
  setMode(mode);
  resetWrap(wrap);
  const data = JSON.parse(document.getElementById('inspire-' + mode).textContent);
  const svg = getSvg(wrap);
  svg.setAttribute('viewBox', `${data.zoom.x} ${data.zoom.y} ${data.zoom.w} ${data.zoom.h}`);
  Object.entries(data.fills).forEach(([id, paletteIndex]) => {
    const el = wrap.querySelector(`[data-id="${id}"]`);
    if (el) el.setAttribute('fill', data.palette[paletteIndex]);
  });
  buildList();
}

function buildList() {
  const wrap = getActiveWrap();
  partsList.innerHTML = '';
  wrap.querySelectorAll('[data-id][data-name]').forEach(el => {
    const li = document.createElement('li');
    li.innerHTML = `${el.getAttribute('data-name')} <span class="small">(${el.getAttribute('data-id')})</span>`;
    partsList.appendChild(li);
  });
}

btnShowL1.addEventListener('click', () => setMode('l1'));
btnShowL2.addEventListener('click', () => setMode('l2'));
btnInspireL1.addEventListener('click', () => applyInspire('l1'));
btnInspireL2.addEventListener('click', () => applyInspire('l2'));
btnReset.addEventListener('click', () => { resetWrap(wrapL1); resetWrap(wrapL2); buildList(); });

resetWrap(wrapL1); resetWrap(wrapL2); buildList();
</script>
