<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>dofen studio pack</title>
  <style>
    body{font-family:system-ui,Arial; margin:16px; color:#111827}
    .row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-bottom:12px}
    button{padding:10px 12px; border:1px solid #e5e7eb; background:#fff; border-radius:10px; cursor:pointer}
    button:active{transform:translateY(1px)}
    .wrap{display:grid; grid-template-columns: 1fr; gap:14px}
    .card{border:1px solid #e5e7eb; border-radius:16px; padding:12px}
    .svgbox{width:100%; overflow:auto}
    .svgbox svg{max-width:100%; height:auto; display:block}
    h2{margin:6px 0 10px}
    ol{margin:0; padding-right:20px}
    .muted{color:#6b7280; font-size:12px}
    .pill{display:inline-block; padding:4px 10px; border-radius:999px; border:1px solid #e5e7eb; font-size:12px}
  </style>
</head>
<body>

  <div class="row">
    <span class="pill" id="modePill">מצב: L1</span>
    <button id="btnL1">הצג L1</button>
    <button id="btnL2">הצג L2</button>
    <button id="btnInspireL1">השראה (L1)</button>
    <button id="btnInspireL2">השראה (L2)</button>
    <button id="btnReset">איפוס</button>
  </div>

    <div class="card">
      <h2>רשימת חלקים בציור</h2>
      <ol id="partsList"></ol>
    </div>

  <script type="application/json" id="inspire-l1">
{
  "zoom": { "x": 330, "y": 235, "w": 200, "h": 210 },
  "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"],
  "fills": {
    "board-3": 0,
    "socket-3": 6,
    "bar-mid": 4,
    "frame": 7
  }
}
  </script>

  <script type="application/json" id="inspire-l2">
{
  "zoom": { "x": 315, "y": 205, "w": 260, "h": 260 },
  "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"],
  "fills": {
    "b3-top": 0,
    "b3-mid": 1,
    "b3-bot": 0,
    "bm-left": 4,
    "bm-mid": 5,
    "bm-right": 4,
    "bm-cap-l": 6,
    "bm-cap-r": 6,
    "s3-top": 6,
    "s3-base": 7,
    "s3-hole": 2
  }
}
  </script>

  <script>
    const DEFAULT_VIEWBOX = "0 0 860 520";

    const stageL1 = document.getElementById("stageL1");
    const stageL2 = document.getElementById("stageL2");
    const svgL1 = document.getElementById("svgL1");
    const svgL2 = document.getElementById("svgL2");
    const partsList = document.getElementById("partsList");
    const modePill = document.getElementById("modePill");

    function getActiveSvg() {
      return stageL2.style.display === "none" ? svgL1 : svgL2;
    }

    function setMode(mode) {
      if (mode === "L1") {
        stageL1.style.display = "";
        stageL2.style.display = "none";
        modePill.textContent = "מצב: L1";
      } else {
        stageL1.style.display = "none";
        stageL2.style.display = "";
        modePill.textContent = "מצב: L2";
      }
      resetActive();
      renderParts();
    }

    function resetFills(svg) {
      svg.querySelectorAll("[data-id][data-name]").forEach(el => {
        el.setAttribute("fill", "none");
      });
    }

    function resetZoom(svg) {
      svg.setAttribute("viewBox", DEFAULT_VIEWBOX);
    }

    function resetActive() {
      const svg = getActiveSvg();
      resetFills(svg);
      resetZoom(svg);
    }

    function applyInspire(which) {
      const svg = getActiveSvg();
      resetFills(svg);

      const jsonEl = document.getElementById(which === "L1" ? "inspire-l1" : "inspire-l2");
      const data = JSON.parse(jsonEl.textContent);

      const z = data.zoom;
      svg.setAttribute("viewBox", `${z.x} ${z.y} ${z.w} ${z.h}`);

      const pal = data.palette;
      Object.entries(data.fills).forEach(([id, idx]) => {
        const el = svg.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if (el) el.setAttribute("fill", pal[idx]);
      });
    }

    function renderParts() {
      const svg = getActiveSvg();
      const items = Array.from(svg.querySelectorAll("[data-id][data-name]"));
      partsList.innerHTML = "";
      items.forEach(el => {
        const name = el.getAttribute("data-name");
        const id = el.getAttribute("data-id");
        const li = document.createElement("li");
        li.innerHTML = `${name} <span class="muted">(${id})</span>`;
        partsList.appendChild(li);
      });
    }

    document.getElementById("btnL1").addEventListener("click", () => setMode("L1"));
    document.getElementById("btnL2").addEventListener("click", () => setMode("L2"));
    document.getElementById("btnInspireL1").addEventListener("click", () => applyInspire("L1"));
    document.getElementById("btnInspireL2").addEventListener("click", () => applyInspire("L2"));
    document.getElementById("btnReset").addEventListener("click", () => { resetActive(); });

    setMode("L1");
  </script>
</body>
</html>
