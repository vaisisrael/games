  <h2>רשימת חלקים בציור</h2>
  <ol id="parts-list"></ol>

  <script type="application/json" id="inspire-l1">{
  "zoom": { "x": 300, "y": 50, "w": 250, "h": 170 },
  "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"],
  "fills": {
    "flame-left": 4,
    "flame-center": 5,
    "flame-right": 4
  }
}
</script>
  <script type="application/json" id="inspire-l2">{
  "zoom": { "x": 300, "y": 45, "w": 260, "h": 180 },
  "palette": ["#60a5fa", "#1d4ed8", "#a78bfa", "#16a34a", "#f59e0b", "#ef4444", "#9ca3af", "#111827"],
  "fills": {
    "flame-left-outer": 4,
    "flame-left-inner": 5,
    "flame-center-outer-left": 4,
    "flame-center-core": 5,
    "flame-center-outer-right": 4,
    "flame-right-outer": 4,
    "flame-right-inner": 5
  }
}
</script>

<script>
(function () {
  const svgL1 = document.getElementById('svg-l1');
  const svgL2 = document.getElementById('svg-l2');
  const partsList = document.getElementById('parts-list');
  const showL1Btn = document.getElementById('show-l1');
  const showL2Btn = document.getElementById('show-l2');
  let activeSvg = svgL1;

  function clearPaint(svg) {
    svg.querySelectorAll('[data-id]').forEach(el => {
      el.setAttribute('fill', 'none');
    });
    svg.setAttribute('viewBox', svg.dataset.defaultViewbox || '0 0 860 520');
  }

  function rebuildPartsList(svg) {
    partsList.innerHTML = '';
    svg.querySelectorAll('[data-id][data-name]').forEach(el => {
      const li = document.createElement('li');
      const small = document.createElement('small');
      li.textContent = el.getAttribute('data-name') + ' ';
      small.textContent = '(' + el.getAttribute('data-id') + ')';
      li.appendChild(small);
      partsList.appendChild(li);
    });
  }

  function activate(svg) {
    [svgL1, svgL2].forEach(s => s.classList.remove('active'));
    [showL1Btn, showL2Btn].forEach(b => b.classList.remove('active'));
    activeSvg = svg;
    activeSvg.classList.add('active');
    if (svg === svgL1) showL1Btn.classList.add('active');
    if (svg === svgL2) showL2Btn.classList.add('active');
    rebuildPartsList(activeSvg);
  }

  function applyInspire(svg, scriptId) {
    clearPaint(svg);
    const data = JSON.parse(document.getElementById(scriptId).textContent);
    const palette = data.palette || [];
    Object.entries(data.fills || {}).forEach(([id, idx]) => {
      const el = svg.querySelector('[data-id="' + id + '"]');
      if (el && palette[idx]) el.setAttribute('fill', palette[idx]);
    });
    const z = data.zoom;
    if (z) svg.setAttribute('viewBox', [z.x, z.y, z.w, z.h].join(' '));
  }

  document.getElementById('show-l1').addEventListener('click', () => activate(svgL1));
  document.getElementById('show-l2').addEventListener('click', () => activate(svgL2));
  document.getElementById('apply-l1').addEventListener('click', () => {
    activate(svgL1);
    applyInspire(svgL1, 'inspire-l1');
  });
  document.getElementById('apply-l2').addEventListener('click', () => {
    activate(svgL2);
    applyInspire(svgL2, 'inspire-l2');
  });
  document.getElementById('reset-view').addEventListener('click', () => {
    clearPaint(svgL1);
    clearPaint(svgL2);
    activate(activeSvg);
  });

  clearPaint(svgL1);
  clearPaint(svgL2);
  activate(svgL1);
})();
</script>
