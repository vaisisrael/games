  <script>
    const stage = document.getElementById('stage');
    const partsOl = document.getElementById('parts');

    function parseJSON(id){
      return JSON.parse(document.getElementById(id).textContent.trim());
    }

    function mount(level){
      stage.innerHTML = '';
      const tpl = document.getElementById(level === 'l2' ? 'svg-l2' : 'svg-l1');
      const node = tpl.content.cloneNode(true);
      stage.appendChild(node);
      const svg = stage.querySelector('svg');
      svg.dataset.level = level;
      svg.dataset.baseViewBox = svg.getAttribute('viewBox') || '0 0 860 520';
      buildPartsList(svg);
      resetFills(svg);
    }

    function buildPartsList(svg){
      partsOl.innerHTML = '';
      const els = svg.querySelectorAll('[data-id][data-name]');
      els.forEach(el=>{
        const li = document.createElement('li');
        const name = el.getAttribute('data-name');
        const id = el.getAttribute('data-id');
        li.innerHTML = `${name} <span class="muted">(${id})</span>`;
        partsOl.appendChild(li);
      });
    }

    function resetFills(svg){
      svg.setAttribute('viewBox', svg.dataset.baseViewBox);
      const els = svg.querySelectorAll('[data-id]');
      els.forEach(el=>{
        el.setAttribute('fill','none');
      });
    }

    function applyInspiration(kind){
      const svg = stage.querySelector('svg');
      if(!svg) return;

      const insp = parseJSON(kind === 'l2' ? 'inspire-l2' : 'inspire-l1');
      resetFills(svg);

      const {x,y,w,h} = insp.zoom;
      svg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);

      const palette = insp.palette;
      const fills = insp.fills || {};
      Object.keys(fills).forEach(id=>{
        const idx = fills[id];
        const color = palette[idx];
        const el = svg.querySelector(`[data-id="${CSS.escape(id)}"]`);
        if(el) el.setAttribute('fill', color);
      });
    }

    // UI
    const btnL1 = document.getElementById('btn-l1');
    const btnL2 = document.getElementById('btn-l2');

    btnL1.addEventListener('click', ()=>{
      btnL1.classList.add('active'); btnL2.classList.remove('active');
      mount('l1');
    });
    btnL2.addEventListener('click', ()=>{
      btnL2.classList.add('active'); btnL1.classList.remove('active');
      mount('l2');
    });

    document.getElementById('btn-inspire-l1').addEventListener('click', ()=>applyInspiration('l1'));
    document.getElementById('btn-inspire-l2').addEventListener('click', ()=>applyInspiration('l2'));
    document.getElementById('btn-reset').addEventListener('click', ()=>{
      const svg = stage.querySelector('svg'); if(svg) resetFills(svg);
    });

    // init
    mount('l1');
  </script>
